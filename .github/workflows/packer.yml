name: Packer Build AMI

on:
  push:
    branches:
      - master

jobs:
  packer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Packer
        uses: hashicorp/setup-packer@v2

      # 🔥 IMPORTANT: Clear old cached plugins (fix for your issue)
      - name: Clean Packer Plugins
        run: rm -rf ~/.config/packer/plugins

      # 🔍 Debug (optional but useful)
      - name: Check Packer Version
        run: packer version

      - name: Initialize Packer
        run: packer init aws-ubuntu.pkr.hcl

      - name: Validate Packer Template
        run: packer validate aws-ubuntu.pkr.hcl

      - name: Build AMI
        run: packer build aws-ubuntu.pkr.hcl
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1